name: Health Check - AGS Bots

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check all bots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BOTS=(
            "Tareapp Chile|https://tareapp.ags-ed.com/health"
            "EducaProject Peru|https://webhook.ags-ed.com/health"
            "Trabajos Helper Argentina|https://helper.ags-ed.com/health"
          )

          FAILED=""
          for bot_entry in "${BOTS[@]}"; do
            NAME="${bot_entry%%|*}"
            URL="${bot_entry##*|}"

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "FAIL: $NAME -> HTTP $HTTP_CODE"
              FAILED="$FAILED\n- $NAME (HTTP $HTTP_CODE)"
            else
              echo "OK: $NAME"
            fi
          done

          if [ -n "$FAILED" ]; then
            MSG="ALERTA - Bots caidos%0A%0AEstos servicios no responden:${FAILED}%0A%0AFecha: $(TZ='America/Santiago' date '+%Y-%m-%d %H:%M:%S')%0AAccion: Verificar PC y servicios NSSM"

            curl -s -X POST \
              "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=$(echo -e "$MSG")" \
              -d "parse_mode=HTML" \
              > /dev/null

            echo "Alert sent to Telegram"
          else
            echo "All bots OK"
          fi
